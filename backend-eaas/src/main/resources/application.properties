spring.application.name=tourism-eaas
server.port=8081
server.servlet.context-path=/eaas

# Tomcat temp directory (for sandbox compatibility)
server.tomcat.basedir=./target/tomcat-eaas
server.tomcat.accesslog.enabled=false
server.error.whitelabel.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.tourism=DEBUG

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
