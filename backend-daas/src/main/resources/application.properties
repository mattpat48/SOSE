spring.application.name=tourism-daas
server.port=8080
server.servlet.context-path=/daas

# Tomcat temp directory (for sandbox compatibility)
server.tomcat.basedir=./target/tomcat-daas
server.tomcat.accesslog.enabled=false
server.error.whitelabel.enabled=false

# RDF Store Configuration
rdf.storage.type=memory

# Logging
logging.level.root=INFO
logging.level.com.tourism=DEBUG
logging.level.org.apache.jena=WARN

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
